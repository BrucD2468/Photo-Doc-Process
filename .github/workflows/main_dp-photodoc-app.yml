name: Build and deploy Python app to Azure Web App - DP-photodoc-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Optional: Install dependencies to validate in CI
      - name: Install dependencies for validation
        run: pip install -r backend/requirements.txt

      # 4️⃣ Deploy backend folder to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DP-photodoc-app'  # your Azure Web App name
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_75BF3A5D2E07446E8DE52E98CCF2765C }}
          package: backend